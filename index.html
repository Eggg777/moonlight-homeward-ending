<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />

    <title>月光下的歸途</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="ending" aria-label="結局過場：月光下的歸途">

      <section class="story-panel" aria-live="polite">
        <p class="chapter">月光下的歸途</p>

      <button id="nextButton" class="next-button" type="button" aria-label="下一張">
        <span id="nextLabel">點一下，繼續</span>

      <div id="complete" class="complete" hidden>
        <span>冒險完成</span>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
